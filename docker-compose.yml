services:
  postgres:
    image: postgres:17-alpine
    container_name: sculpt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sculpt
      POSTGRES_PASSWORD: sculpt
      POSTGRES_DB: sculpt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sculpt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
